apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.admin.ui.domain | default (print "admin." .Values.domain) }}
  {{- if and .Values.ingress .Values.ingress.annotations }}
  annotations:
{{ .Values.ingress.annotations | toYaml | indent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - host: {{ .Values.admin.ui.domain | default (print "admin." .Values.domain) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-admin-ui
                port:
                  number: 80
  tls:
    - hosts:
        - {{ .Values.admin.ui.domain | default (print "admin." .Values.domain) }}
      secretName: {{ .Values.admin.ui.domain | default (print "admin." .Values.domain) }}-tls
